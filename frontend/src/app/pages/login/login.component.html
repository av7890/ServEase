<div class="auth-page">
  <div class="auth-brand-panel">
    <div>
      <a routerLink="/" style="display:flex;align-items:center;gap:.6rem;text-decoration:none;margin-bottom:3rem;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:rgba(255,255,255,.12);border-radius:8px;color:#fff;font-weight:700;">SE</span>
        <span style="font-family:var(--ff-head);font-size:1.25rem;font-weight:700;color:#fff;">ServEase</span>
      </a>
      <div class="auth-brand-tagline">Sign in to the <em>live platform</em></div>
      <p class="auth-brand-sub">Join the Experience.</p>
      <ul class="auth-brand-features">

      </ul>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-card">
      <h2>Login</h2>
      <p class="subtitle">Choose your role and sign in.</p>
      <div class="alert alert-error" *ngIf="error">{{ error }}</div>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
          <label>Role</label>
          <select formControlName="role">
            <option value="customer">Customer</option>
            <option value="provider">Provider</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">{{ loading ? 'Signing in...' : 'Sign In' }}</button>
      </form>
      <div class="auth-divider">or</div>
      <a routerLink="/register" class="btn btn-outline btn-block">Create an Account</a>
      <div class="auth-footer"><a routerLink="/reset-password">Forgot your password?</a></div>
    </div>
  </div>
</div>
