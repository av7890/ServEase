<div class="auth-page">
  <div class="auth-brand-panel">
    <div>
      <a routerLink="/" style="display:flex;align-items:center;gap:.6rem;text-decoration:none;margin-bottom:3rem;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:rgba(255,255,255,.12);border-radius:8px;color:#fff;font-weight:700;">SE</span>
        <span style="font-family:var(--ff-head);font-size:1.25rem;font-weight:700;color:#fff;">ServEase</span>
      </a>
      <div class="auth-brand-tagline">Account<em>Creation</em></div>
      <p class="auth-brand-sub">Join the ServEase community today.</p>
      <ul class="auth-brand-features">

      </ul>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-card" style="max-width:540px;">
      <h2>Create Account</h2>
      <p class="subtitle">Step {{ step }} of 2</p>
      <div class="alert alert-error" *ngIf="error">{{ error }}</div>
      <div class="alert alert-success" *ngIf="success">{{ success }}</div>

      <div *ngIf="step===1">
        <div class="form-group">
          <label>Account Type</label>
          <select [(ngModel)]="role">
            <option value="customer">Customer</option>
            <option value="provider">Provider</option>
          </select>
        </div>
        <form [formGroup]="accountForm">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" formControlName="firstName" />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" formControlName="lastName" />
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email" />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" formControlName="phone" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Password</label>
              <input type="password" formControlName="password" />
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" formControlName="confirmPassword" />
            </div>
          </div>
        </form>
        <button class="btn btn-primary btn-block" type="button" (click)="nextStep()">Continue</button>
      </div>

      <div *ngIf="step===2">
        <form [formGroup]="detailForm">
          <div class="form-group">
            <label>Location</label>
            <select formControlName="location_id">
              <option value="">Select a location</option>
              <option *ngFor="let location of locations" [value]="location.location_id">{{ location.city }}, {{ location.area }}</option>
            </select>
          </div>

          <div *ngIf="role==='customer'" class="form-group">
            <label>Address</label>
            <textarea rows="4" formControlName="address"></textarea>
          </div>

          <div *ngIf="role==='provider'">
            <div class="form-group">
              <label>Years of Experience</label>
              <input type="number" formControlName="experience_years" />
            </div>
            <div class="form-group">
              <label>Provider Bio</label>
              <textarea rows="4" formControlName="bio"></textarea>
            </div>
            <div class="alert alert-info">Approval documents are managed outside this screen. The provider record is still saved and routed to admin approval.</div>
          </div>
        </form>

        <div class="d-flex gap-2">
          <button class="btn btn-outline" type="button" (click)="step = 1">Back</button>
          <button class="btn btn-gold" type="button" [disabled]="loading" (click)="submit()">{{ loading ? 'Saving...' : 'Submit' }}</button>
        </div>
      </div>

      <div class="auth-footer">Already registered? <a routerLink="/login">Sign in</a></div>
    </div>
  </div>
</div>
