<div class="auth-page">
  <div class="auth-brand-panel">
    <div>
      <a routerLink="/" style="display:flex;align-items:center;gap:.6rem;text-decoration:none;margin-bottom:3rem;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:rgba(255,255,255,.12);border-radius:8px;color:#fff;font-weight:700;">SE</span>
        <span style="font-family:var(--ff-head);font-size:1.25rem;font-weight:700;color:#fff;">ServEase</span>
      </a>
      <div class="auth-brand-tagline">Reset your <em>stored password</em></div>
      <p class="auth-brand-sub">This updates the actual password value in the role-specific database table.</p>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-card">
      <h2>Reset Password</h2>
      <p class="subtitle">Provide the same role and email used on your account.</p>
      <div class="alert alert-error" *ngIf="error">{{ error }}</div>
      <div class="alert alert-success" *ngIf="success">{{ success }}</div>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
          <label>Role</label>
          <select formControlName="role">
            <option value="customer">Customer</option>
            <option value="provider">Provider</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" />
        </div>
        <div class="form-group" *ngIf="form.value.role !== 'admin'">
          <label>Phone</label>
          <input type="text" formControlName="phone" />
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" formControlName="newPassword" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" formControlName="confirmPassword" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">{{ loading ? 'Updating...' : 'Reset Password' }}</button>
      </form>
      <div class="auth-footer"><a routerLink="/login">Back to login</a></div>
    </div>
  </div>
</div>
